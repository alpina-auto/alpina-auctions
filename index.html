<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Auctions</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-storage.js"></script>
</head>
<body>
    <h1>Welcome to Car Auctions</h1>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC_785J2g7-FRr1p02EFAGr0Hs8eB00s0I",
            authDomain: "auto-alpina-auctions-be7e0.firebaseapp.com",
            projectId: "auto-alpina-auctions-be7e0",
            storageBucket: "auto-alpina-auctions-be7e0.firebasestorage.app",
            messagingSenderId: "183730551827",
            appId: "1:183730551827:web:b6fcae969bd2a5c46693e6"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        // Function to upload images and store car data
        function uploadCarData(carData, imageFile) {
            // Upload image
            const storageRef = storage.ref(`images/${imageFile.name}`);
            storageRef.put(imageFile).then((snapshot) => {
                console.log('Image uploaded successfully!');
                snapshot.ref.getDownloadURL().then((imageUrl) => {
                    // Store car data in Firebase Realtime Database
                    const newCarRef = database.ref('cars').push();
                    carData.imageUrl = imageUrl;
                    newCarRef.set(carData);
                });
            });
        }

        // Example of usage
        // uploadCarData({ make: 'Toyota', model: 'Camry' }, selectedImageFile);
    </script>
</body>
</html>
